<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body{
            background-color: black;
        }
        body>div:first-child{
            height: 90vh;
            width: 90vw;
            background-color: red;
            position: absolute;
            left: 90px;
            top: 40px;

        }
        body>div:first-child>div{
            height: 300px;
            width: 300px;
            background-color: goldenrod;
            position: absolute;
            right: 500px;
            top: 150px;
            animation-name: Box;
            animation-duration: 3s;
            animation-timing-function: linear;
            animation-delay: 0s;
            animation-iteration-count: 3;
            animation-direction: alternate;
            
        }
        @keyframes Box{
            /* from{
                background-color: goldenrod;
                

            }
            to{
                background-color: bisque;
                width: 400px;
            } */

            0%{
                    background-color: lightblue;
                    border-radius: 25%;
                    position: relative;
                    left: 0;
                    top: 0;
            }   
            25%{
                background-color: gray;
                border-radius: 25%;
                position: relative;
                left: 600px;
                top: 0;
            }
            50%{
                background-color: blanchedalmond;  
            border-radius: 30%;   
        position:relative;
    top: 300px;
    left: 600px;
    
    }
            75%{
                background-color: blueviolet;
                border-radius: 40%;
                position: relative;
                top: 300px;
                left:0;
            }
            100%{
                background-color:brown;
                border-radius: 50%;
                position: relative;
                left:0;
                top:0;
            }
             }
    </style>
</head>

</html>
