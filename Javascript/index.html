<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Java script</title>
    <style>
        #jsdiv1 {
            animation: grow 1s ease-in infinite;
            transform: scale(2);
        }

        @keyframes grow {
            from {
                transform: scale(2) translatex(20px);
            }

            to {
                transform: scale(2.2) translatex(-20px);
            }
        }
    </style>
</head>

<body>
    <script src="meow.js"></script>
</body>

</html>
